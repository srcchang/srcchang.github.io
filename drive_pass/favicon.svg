<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <!-- 品牌雙色漸層圓角底（橘=汽車 / 紫=機車） -->
  <rect width="32" height="32" rx="7" fill="url(#g)"/>
  <!-- 橫向紅綠燈：呼應 app icon 的紅綠燈意象 -->
  <rect x="5" y="11" width="22" height="10" rx="5" fill="#000000" fill-opacity="0.22"/>
  <circle cx="10" cy="16" r="2.8" fill="#FF5A52"/>
  <circle cx="16" cy="16" r="2.8" fill="#FFC827"/>
  <circle cx="22" cy="16" r="2.8" fill="#34D17E"/>
</svg>
