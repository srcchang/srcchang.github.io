<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600" fill="none">
  <rect width="600" height="600" rx="30" fill="#0A0B14"/>
  <!-- Phone outline -->
  <rect x="180" y="90" width="240" height="420" rx="28" stroke="#00F5A0" stroke-width="3" fill="none" opacity="0.8"/>
  <rect x="210" y="130" width="180" height="300" rx="12" fill="#131428"/>
  <!-- Speaker -->
  <rect x="270" y="105" width="60" height="6" rx="3" fill="#00F5A0" opacity="0.6"/>
  <!-- Sound wave bars -->
  <rect x="240" y="200" width="10" height="60" rx="3" fill="#00F5A0" opacity="0.3"/>
  <rect x="260" y="180" width="10" height="100" rx="3" fill="#00F5A0" opacity="0.5"/>
  <rect x="280" y="160" width="10" height="140" rx="3" fill="#00F5A0" opacity="0.7"/>
  <rect x="300" y="150" width="10" height="160" rx="3" fill="#00F5A0"/>
  <rect x="320" y="160" width="10" height="140" rx="3" fill="#00F5A0" opacity="0.7"/>
  <rect x="340" y="180" width="10" height="100" rx="3" fill="#00F5A0" opacity="0.5"/>
  <rect x="360" y="200" width="10" height="60" rx="3" fill="#00F5A0" opacity="0.3"/>
  <!-- Home indicator -->
  <rect x="250" y="480" width="100" height="5" rx="2.5" fill="#00F5A0" opacity="0.5"/>
  <!-- Arrow arc -->
  <path d="M300 50 Q150 120 200 350" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="6 4" opacity="0.6" fill="none"/>
  <path d="M300 50 Q450 120 400 350" stroke="#FF4D6D" stroke-width="2" stroke-dasharray="6 4" opacity="0.6" fill="none"/>
  <!-- Arrow heads -->
  <polygon points="190,350 200,340 210,350 200,360" fill="#8B5CF6" opacity="0.6"/>
  <polygon points="410,350 400,340 390,350 400,360" fill="#FF4D6D" opacity="0.6"/>
  <!-- Play triangle -->
  <polygon points="295,280 305,270 305,290" fill="#00F5A0"/>
</svg>
