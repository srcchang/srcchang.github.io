name: Build check

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  build-check:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build all Astro sites
        run: npm run build
